services:
  api:
    build: .
    environment:
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required. Copy .env.example to .env}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://secondbrain:secondbrain@db:5432/secondbrain}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-secondbrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secondbrain}
      POSTGRES_DB: ${POSTGRES_DB:-secondbrain}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
